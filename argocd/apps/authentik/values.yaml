---
# ============================================================
# Authentik SSO — wrapper values
#
# Credentials-Block (SealedSecret):
#   Werte mit kubeseal versiegeln und hier eintragen.
#   Anleitung: docs/14-sso-authentik.md → Abschnitt "Secrets versiegeln"
# ============================================================

credentials:
  enabled: true
  secretName: authentik-credentials
  # Versiegelte Ciphertext-Werte — NIEMALS Klartext committen!
  # Versiegeln: echo -n 'WERT' | kubeseal --raw --namespace authentik \
  #             --name authentik-credentials --controller-namespace sealed-secrets \
  #             --controller-name sealed-secrets-controller
  encryptedSecretKey: ""
  encryptedDbPassword: ""
  encryptedBootstrapPassword: ""
  encryptedBootstrapEmail: ""

# ============================================================
# Sub-Chart: goauthentik.io/authentik
# Alle Keys unterhalb von `authentik:` landen beim upstream-Chart.
# Upstream values.yaml:
#   https://github.com/goauthentik/authentik/blob/main/helm/values.yaml
# ============================================================

authentik:
  # ---- Kern-Konfiguration ---------------------------------
  authentik:
    error_reporting:
      enabled: false
    avatars: "none"
    log_level: info
    postgresql:
      host: "{{ .Release.Name }}-postgresql"
      name: authentik
      user: authentik
      # password kommt aus global.env (AUTHENTIK_POSTGRESQL__PASSWORD)

  # ---- Secrets (AUTHENTIK_BOOTSTRAP_* nur beim ersten Start) ----
  global:
    env:
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: secret_key
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: db_password
      - name: AUTHENTIK_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: bootstrap_password
      - name: AUTHENTIK_BOOTSTRAP_EMAIL
        valueFrom:
          secretKeyRef:
            name: authentik-credentials
            key: bootstrap_email

  # ---- Server (Web-UI + API) ------------------------------
  server:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - authentik.homeserver
      paths:
        - "/"
      pathType: Prefix
      tls: []

    metrics:
      serviceMonitor:
        create: false

  # ---- Worker (Background-Tasks) --------------------------
  worker:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

  # ---- PostgreSQL (eingebettet) ---------------------------
  # Chart 2026.x nutzt library/postgres:17-bookworm statt des alten Bitnami-Images.
  postgresql:
    enabled: true
    auth:
      username: authentik
      database: authentik
      existingSecret: authentik-credentials
      secretKeys:
        userPasswordKey: db_password
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 4Gi
      resourcesPreset: "none"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

  # Redis ist ab Chart 2026.x kein eigenständiger Dienst mehr.
