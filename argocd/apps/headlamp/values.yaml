---
# Values passed through to the headlamp sub-chart.
# All keys live under `headlamp:` because that is the dependency name.
headlamp:
  replicaCount: 1

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations: {}
    hosts:
      - host: headlamp.homeserver
        paths:
          - path: /
            type: Prefix
    tls: []

  # ---- OIDC — Authentik Single Sign-On -------------------------
  # Anleitung: docs/16-sso-alle-dienste.md → Schritt 2
  # Nach dem Versiegeln der Secrets: oidc.enabled auf true setzen.
  oidc:
    enabled: false
    issuerURL: "http://authentik.homeserver/application/o/headlamp/"
    scopes: "openid email profile groups"
    secretName: headlamp-oidc

  env:
    - name: HEADLAMP_CONFIG_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: clientId
          optional: true
    - name: HEADLAMP_CONFIG_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: headlamp-oidc
          key: clientSecret
          optional: true
    - name: HEADLAMP_CONFIG_OIDC_ISSUER_URL
      value: "http://authentik.homeserver/application/o/headlamp/"
    - name: HEADLAMP_CONFIG_OIDC_SCOPES
      value: "openid email profile groups"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # The upstream chart creates a ServiceAccount named after the release.
  # We bind it to cluster-admin in templates/clusterrolebinding.yaml.
  serviceAccount:
    create: true

# ---- SealedSecret-Konfiguration (consumed by templates/oidc-sealedsecret.yaml) ---
# Anleitung: docs/16-sso-alle-dienste.md → Schritt 2.3
# 1. kubeseal-Befehle aus der Anleitung ausführen
# 2. Ausgabe hier eintragen
# 3. enabled auf true setzen
# 4. Gleichzeitig oben oidc.enabled: true setzen
oidcSecret:
  enabled: false
  name: headlamp-oidc
  encryptedClientId: ""
  encryptedClientSecret: ""
